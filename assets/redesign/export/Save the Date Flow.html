<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maya &amp; Nick — Guest Flow Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="flow.css" />
<link rel="stylesheet" href="savedate-options.css" />
<style>
  html,body{ margin:0; height:100%; background:#0c100d; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="options.jsx"></script>
<script type="text/babel" src="flow.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App(){
  return (
    <DesignCanvas>
      <DCSection id="flow" title="Guest Flow · Desktop"
        subtitle="Three screens, left → right. Each cross-fades dramatically into the next: Welcome → Address → Save the Date. A playable version lives in “Guest Flow — Play.html”.">
        <DCArtboard id="s1" label="1 · Welcome / Guest Login" width={1440} height={1024}>
          <Screen1Welcome />
        </DCArtboard>
        <DCArtboard id="s2" label="2 · Address Collection (Option 3)" width={1440} height={1024}>
          <Screen2Address />
        </DCArtboard>
        <DCArtboard id="s3" label="3 · Save the Date" width={1440} height={1024}>
          <Screen3SaveTheDate />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
