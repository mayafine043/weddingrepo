<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maya & Nick</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
</head>
<body class="home-redesign">
  <div class="bg">
    <div class="form-page">
      <div class="card fade-in">

        <div id="form-container">
          <div class="home-layout">
          <div class="site-header">
            <h1 class="site-title">
              <span>Maya Fine <em>&amp;</em></span>
              <span>Nick Figueroa</span>
            </h1>
            <div class="title-rule"></div>
            <p class="site-subtitle">Are Getting Married</p>
          </div>

          <div class="form-shade">
          <form id="address-form" novalidate>
            <div class="form-grid">

              <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" placeholder="Jane" required>
              </div>

              <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" placeholder="Smith" required>
              </div>

              <div class="form-group full">
                <label for="street_address">Street Address</label>
                <input type="text" id="street_address" name="street_address" placeholder="123 Main Street" required>
              </div>

              <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" placeholder="Los Angeles" required>
              </div>

              <div class="form-group">
                <label>State</label>
                <div class="custom-select" id="state-select">
                  <div class="custom-select__trigger" tabindex="0" role="combobox" aria-expanded="false" aria-haspopup="listbox">
                    <span class="custom-select__value">Select</span>
                    <svg width="10" height="7" viewBox="0 0 10 7" fill="none" aria-hidden="true">
                      <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </div>
                  <div class="custom-select__panel" role="listbox">
                    <div class="custom-select__opt" data-value="AL">AL</div><div class="custom-select__opt" data-value="AK">AK</div><div class="custom-select__opt" data-value="AZ">AZ</div><div class="custom-select__opt" data-value="AR">AR</div>
                    <div class="custom-select__opt" data-value="CA">CA</div><div class="custom-select__opt" data-value="CO">CO</div><div class="custom-select__opt" data-value="CT">CT</div><div class="custom-select__opt" data-value="DE">DE</div>
                    <div class="custom-select__opt" data-value="FL">FL</div><div class="custom-select__opt" data-value="GA">GA</div><div class="custom-select__opt" data-value="HI">HI</div><div class="custom-select__opt" data-value="ID">ID</div>
                    <div class="custom-select__opt" data-value="IL">IL</div><div class="custom-select__opt" data-value="IN">IN</div><div class="custom-select__opt" data-value="IA">IA</div><div class="custom-select__opt" data-value="KS">KS</div>
                    <div class="custom-select__opt" data-value="KY">KY</div><div class="custom-select__opt" data-value="LA">LA</div><div class="custom-select__opt" data-value="ME">ME</div><div class="custom-select__opt" data-value="MD">MD</div>
                    <div class="custom-select__opt" data-value="MA">MA</div><div class="custom-select__opt" data-value="MI">MI</div><div class="custom-select__opt" data-value="MN">MN</div><div class="custom-select__opt" data-value="MS">MS</div>
                    <div class="custom-select__opt" data-value="MO">MO</div><div class="custom-select__opt" data-value="MT">MT</div><div class="custom-select__opt" data-value="NE">NE</div><div class="custom-select__opt" data-value="NV">NV</div>
                    <div class="custom-select__opt" data-value="NH">NH</div><div class="custom-select__opt" data-value="NJ">NJ</div><div class="custom-select__opt" data-value="NM">NM</div><div class="custom-select__opt" data-value="NY">NY</div>
                    <div class="custom-select__opt" data-value="NC">NC</div><div class="custom-select__opt" data-value="ND">ND</div><div class="custom-select__opt" data-value="OH">OH</div><div class="custom-select__opt" data-value="OK">OK</div>
                    <div class="custom-select__opt" data-value="OR">OR</div><div class="custom-select__opt" data-value="PA">PA</div><div class="custom-select__opt" data-value="RI">RI</div><div class="custom-select__opt" data-value="SC">SC</div>
                    <div class="custom-select__opt" data-value="SD">SD</div><div class="custom-select__opt" data-value="TN">TN</div><div class="custom-select__opt" data-value="TX">TX</div><div class="custom-select__opt" data-value="UT">UT</div>
                    <div class="custom-select__opt" data-value="VT">VT</div><div class="custom-select__opt" data-value="VA">VA</div><div class="custom-select__opt" data-value="WA">WA</div><div class="custom-select__opt" data-value="WV">WV</div>
                    <div class="custom-select__opt" data-value="WI">WI</div><div class="custom-select__opt" data-value="WY">WY</div>
                  </div>
                  <input type="hidden" id="state" name="state">
                </div>
              </div>

              <div class="form-group">
                <label for="zip">ZIP Code</label>
                <input type="text" id="zip" name="zip" placeholder="90210" required maxlength="10">
              </div>

              <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="(310) 555-0100" required>
              </div>

              <div class="form-group full">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="jane@email.com" required>
              </div>

            </div>

            <button type="submit" class="btn" id="submit-btn">Send My Address</button>
            <p class="message" id="form-message" style="display:none;"></p>
          </form>
          </div>
          </div>
        </div>

        <div id="success-container" class="success-message" style="display:none;">
          <h2>Thank you!</h2>
          <p>Ciao!</p>
        </div>

      </div>
    </div>
  </div>

  <div class="flow-dots"><i></i><i class="on"></i><i></i></div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    if (sessionStorage.getItem('guestLoggedIn') !== 'true') {
      window.location.replace('index.html');
    }

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById('address-form');
    const submitBtn = document.getElementById('submit-btn');
    const messageEl = document.getElementById('form-message');
    const formContainer = document.getElementById('form-container');
    const successContainer = document.getElementById('success-container');

    function showMessage(text, isError = false) {
      messageEl.textContent = text;
      messageEl.className = 'message' + (isError ? ' error' : '');
      messageEl.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const fields = ['first_name','last_name','street_address','city','state','zip','phone','email'];
      for (const f of fields) {
        const el = document.getElementById(f);
        if (!el.value.trim()) {
          showMessage('Please fill in all fields.', true);
          el.focus();
          return;
        }
      }

      const email = document.getElementById('email').value.trim();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        // Check for duplicate email
        const { data: existing } = await client
          .from('guests')
          .select('id')
          .eq('email', email)
          .maybeSingle();

        if (existing) {
          showMessage('We already have your info, thank you!', false);
          submitBtn.disabled = false;
          submitBtn.textContent = 'Send My Address';
          return;
        }

        // Insert guest
        const { data: guest, error: guestError } = await client
          .from('guests')
          .insert({
            first_name: document.getElementById('first_name').value.trim(),
            last_name: document.getElementById('last_name').value.trim(),
            email: email,
            phone: document.getElementById('phone').value.trim()
          })
          .select('id')
          .single();

        if (guestError) throw guestError;

        // Insert address
        const { error: addrError } = await client
          .from('addresses')
          .insert({
            guest_id: guest.id,
            street_address: document.getElementById('street_address').value.trim(),
            city: document.getElementById('city').value.trim(),
            state: document.getElementById('state').value,
            zip: document.getElementById('zip').value.trim()
          });

        if (addrError) throw addrError;

        // Insert submission log
        const payload = {};
        fields.forEach(f => payload[f] = document.getElementById(f).value.trim());
        await client.from('submissions').insert({
          guest_id: guest.id,
          form_name: 'address_collection',
          data: payload
        });

        sessionStorage.setItem('guestSubmittedAddress', 'true');
        window.location.href = 'save-the-date.html';

      } catch (err) {
        console.error(err);
        showMessage('Something went wrong — please try again.', true);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send My Address';
      }
    });
  </script>
  <script>
    (function () {
      const wrap = document.getElementById('state-select');
      const trigger = wrap.querySelector('.custom-select__trigger');
      const valEl = wrap.querySelector('.custom-select__value');
      const hidden = document.getElementById('state');
      const opts = wrap.querySelectorAll('.custom-select__opt');

      function openSel()  { wrap.classList.add('open');    trigger.setAttribute('aria-expanded', 'true'); }
      function closeSel() { wrap.classList.remove('open'); trigger.setAttribute('aria-expanded', 'false'); }

      trigger.addEventListener('click', () => wrap.classList.contains('open') ? closeSel() : openSel());
      trigger.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); wrap.classList.contains('open') ? closeSel() : openSel(); }
        if (e.key === 'Escape') closeSel();
      });

      opts.forEach(opt => {
        opt.addEventListener('click', () => {
          hidden.value = opt.dataset.value;
          valEl.textContent = opt.dataset.value;
          valEl.classList.add('has-value');
          opts.forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          closeSel();
        });
      });

      document.addEventListener('click', e => { if (!wrap.contains(e.target)) closeSel(); });
    })();
  </script>
</body>
</html>
