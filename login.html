<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maya & Nick — Guest Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
</head>
<body class="login-redesign">
  <div class="bg">
    <div class="form-page">
      <div class="card fade-in">
        <div class="login-stage">
          <h1 class="site-title">Maya Fine <em>&amp;</em><br>Nick Figueroa</h1>
          <div class="title-rule"></div>
          <p class="site-subtitle">Welcome. We can&rsquo;t wait to celebrate with you.</p>

          <form id="login-form" novalidate>
            <div class="form-grid">
              <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" placeholder="Jane" required>
              </div>
              <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" placeholder="Smith" required>
              </div>
            </div>
            <button type="submit" class="btn" id="login-btn">Continue</button>
            <p class="message error" id="login-message" style="display:none;">
              We couldn't find your name. Please check the spelling or contact us.
            </p>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const form = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const messageEl = document.getElementById('login-message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const first = document.getElementById('first_name').value.trim();
      const last = document.getElementById('last_name').value.trim();
      if (!first || !last) { messageEl.style.display = 'block'; return; }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Checking...';
      messageEl.style.display = 'none';

      try {
        const { data } = await client
          .from('guests')
          .select('id')
          .ilike('first_name', first)
          .ilike('last_name', last)
          .maybeSingle();

        if (data) {
          window.location.href = 'pages/details.html';
        } else {
          messageEl.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Continue';
        }
      } catch (err) {
        messageEl.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Continue';
      }
    });
  </script>
</body>
</html>
