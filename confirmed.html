<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maya &amp; Nick — Your Details</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
</head>
<body class="home-redesign">
  <div class="bg">
    <div class="form-page">
      <div class="card fade-in">
        <div class="home-layout">

          <!-- Left panel — identical to address page -->
          <div class="site-header">
            <h1 class="site-title">
              <span>Maya Fine <em>&amp;</em></span>
              <span>Nick Figueroa</span>
            </h1>
            <div class="title-rule"></div>
            <p class="site-subtitle">Are Getting Married</p>
          </div>

          <!-- Right panel — read-only fields + stamp -->
          <div class="form-shade conf-panel">
            <div class="form-grid">

              <div class="form-group">
                <label>First Name</label>
                <div class="confirmed-field" id="cf-first"></div>
              </div>

              <div class="form-group">
                <label>Last Name</label>
                <div class="confirmed-field" id="cf-last"></div>
              </div>

              <div class="form-group full">
                <label>Street Address</label>
                <div class="confirmed-field" id="cf-street"></div>
              </div>

              <div class="form-group">
                <label>City</label>
                <div class="confirmed-field" id="cf-city"></div>
              </div>

              <div class="form-group">
                <label>State</label>
                <div class="confirmed-field" id="cf-state"></div>
              </div>

              <div class="form-group">
                <label>ZIP Code</label>
                <div class="confirmed-field" id="cf-zip"></div>
              </div>

              <div class="form-group">
                <label>Phone Number</label>
                <div class="confirmed-field" id="cf-phone"></div>
              </div>

              <div class="form-group full">
                <label>Email</label>
                <div class="confirmed-field" id="cf-email"></div>
              </div>

            </div>

            <a href="save-the-date.html" class="btn">View Save the Date</a>
            <button type="button" class="btn btn-secondary" id="change-btn">Need to change something?</button>

            <!-- Decorative stamp — SVG only, no image files -->
            <div class="conf-stamp-wrap" aria-hidden="true">
              <svg viewBox="0 0 110 110" width="110" height="110" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <path id="stamp-arc-top" d="M 8,55 A 47,47 0 0 1 102,55"/>
                  <path id="stamp-arc-bot" d="M 8,55 A 47,47 0 0 0 102,55"/>
                </defs>

                <!-- Shadow copy — offset 1px, darker tone -->
                <g transform="translate(1,1)" opacity="0.4">
                  <circle cx="55" cy="55" r="50" fill="none" stroke="#9a7020" stroke-width="1" stroke-dasharray="3 2"/>
                  <circle cx="55" cy="55" r="44" fill="none" stroke="#9a7020" stroke-width="1.5"/>
                  <circle cx="55" cy="55" r="38" fill="none" stroke="#9a7020" stroke-width="1" stroke-dasharray="2 2"/>
                  <text fill="#9a7020" font-family="'Cormorant Garamond',Georgia,serif" font-size="6" letter-spacing="1.6">
                    <textPath href="#stamp-arc-top" startOffset="50%" text-anchor="middle">CHÂTEAU DE THAUVENAY</textPath>
                  </text>
                  <text fill="#9a7020" font-family="'Cormorant Garamond',Georgia,serif" font-size="6" letter-spacing="1.6">
                    <textPath href="#stamp-arc-bot" startOffset="50%" text-anchor="middle">LOIRE VALLEY · FRANCE</textPath>
                  </text>
                  <text x="55" y="46" fill="#9a7020" font-family="'Cormorant Garamond',Georgia,serif" font-size="8" text-anchor="middle" letter-spacing="1.5" font-variant="small-caps">REÇU</text>
                  <text class="stamp-sh-l1" x="55" y="57" fill="#9a7020" font-family="'Cormorant Garamond',Georgia,serif" font-size="8.5" text-anchor="middle" letter-spacing="1"></text>
                  <text class="stamp-sh-l2" x="55" y="67" fill="#9a7020" font-family="'Cormorant Garamond',Georgia,serif" font-size="8" text-anchor="middle" letter-spacing="2"></text>
                </g>

                <!-- Main copy — gold tone -->
                <g opacity="0.85">
                  <circle cx="55" cy="55" r="50" fill="none" stroke="#d4a43f" stroke-width="1" stroke-dasharray="3 2"/>
                  <circle cx="55" cy="55" r="44" fill="none" stroke="#d4a43f" stroke-width="1.5"/>
                  <circle cx="55" cy="55" r="38" fill="none" stroke="#d4a43f" stroke-width="1" stroke-dasharray="2 2"/>
                  <text fill="#d4a43f" font-family="'Cormorant Garamond',Georgia,serif" font-size="6" letter-spacing="1.6">
                    <textPath href="#stamp-arc-top" startOffset="50%" text-anchor="middle">CHÂTEAU DE THAUVENAY</textPath>
                  </text>
                  <text fill="#d4a43f" font-family="'Cormorant Garamond',Georgia,serif" font-size="6" letter-spacing="1.6">
                    <textPath href="#stamp-arc-bot" startOffset="50%" text-anchor="middle">LOIRE VALLEY · FRANCE</textPath>
                  </text>
                  <text x="55" y="46" fill="#d4a43f" font-family="'Cormorant Garamond',Georgia,serif" font-size="8" text-anchor="middle" letter-spacing="1.5" font-variant="small-caps">REÇU</text>
                  <text id="stamp-line1" x="55" y="57" fill="#d4a43f" font-family="'Cormorant Garamond',Georgia,serif" font-size="8.5" text-anchor="middle" letter-spacing="1"></text>
                  <text id="stamp-line2" x="55" y="67" fill="#d4a43f" font-family="'Cormorant Garamond',Georgia,serif" font-size="8" text-anchor="middle" letter-spacing="2"></text>
                </g>
              </svg>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div class="flow-dots"><i></i><i></i><i class="on"></i></div>

  <script src="config.js"></script>
  <script>
    if (sessionStorage.getItem('guestLoggedIn') !== 'true' || sessionStorage.getItem('guestHasAddress') !== 'true') {
      window.location.replace('index.html');
    }

    const g = JSON.parse(sessionStorage.getItem('guestData') || '{}');

    document.getElementById('cf-first').textContent  = g.first_name      || '';
    document.getElementById('cf-last').textContent   = g.last_name       || '';
    document.getElementById('cf-street').textContent = g.street_address  || '';
    document.getElementById('cf-city').textContent   = g.city            || '';
    document.getElementById('cf-state').textContent  = g.state           || '';
    document.getElementById('cf-zip').textContent    = g.zip             || '';
    document.getElementById('cf-phone').textContent  = g.phone           || '';
    document.getElementById('cf-email').textContent  = g.email           || '';

    // Stamp date from submitted_at (falls back to created_at or today)
    function fmtDate(iso) {
      const d = new Date(iso);
      if (isNaN(d)) return { l1: '', l2: '' };
      const mon = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()];
      return { l1: mon + ' ' + d.getDate(), l2: String(d.getFullYear()) };
    }
    const dt = fmtDate(g.submitted_at || new Date().toISOString());
    document.getElementById('stamp-line1').textContent = dt.l1;
    document.getElementById('stamp-line2').textContent = dt.l2;
    document.querySelectorAll('.stamp-sh-l1').forEach(el => el.textContent = dt.l1);
    document.querySelectorAll('.stamp-sh-l2').forEach(el => el.textContent = dt.l2);

    // "Need to change something?" → pre-filled mailto
    document.getElementById('change-btn').addEventListener('click', () => {
      const full = (g.first_name || '') + ' ' + (g.last_name || '');
      const subj = encodeURIComponent('Guest Contact Details Update Request – ' + full);
      const body = encodeURIComponent(
        'Hi Maya & Nick,\n\n' +
        'I\'d like to update the contact details currently on file for me, please reference the following for the latest:\n\n' +
        'Name: [' + full + ']\n' +
        'Street Address: [' + (g.street_address || '') + ']\n' +
        'City: [' + (g.city || '') + ']\n' +
        'State: [' + (g.state || '') + ']\n' +
        'Zip Code: [' + (g.zip || '') + ']\n' +
        'Phone Number: [' + (g.phone || '') + ']\n' +
        'Email: [' + (g.email || '') + ']\n\n' +
        'Please let me know what you need from me.\n\n' +
        'Thank you,\n' +
        '[' + full + ']'
      );
      const a = document.createElement('a');
      a.href = 'mailto:mayafine043@gmail.com?subject=' + subj + '&body=' + body;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  </script>
</body>
</html>
